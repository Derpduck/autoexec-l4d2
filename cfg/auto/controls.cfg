// honey's L4D2 Autoexec
// MOUSE
m_rawinput 1
m_filter 0 // Disable mouse filtering / smoothing
m_filter2 0 // Disable mouse filtering / smoothing (for Player 2 lol)
m_mouseaccel1 0 // Disable in-game mouse acceleration
m_mouseaccel2 0 // Disable in-game mouse acceleration (for Player 2 lol)
m_customaccel 0 // Disable custom defined mouse acceleration curve
m_customaccel_exponent 1
m_customaccel_max 0
m_customaccel_scale 0
m_mousespeed 0 // Disable windows mouse acceleration

// BINDS
unbindall

// Null Cancel
alias +mfwd		"dsp_volume 0;-back;+forward;alias checkfwd +forward"
alias +mback	"dsp_volume 0;-forward;+back;alias checkback +back"
alias +mleft	"dsp_volume 0;-moveright;+moveleft;alias checkleft +moveleft"
alias +mright	"dsp_volume 0;-moveleft;+moveright;alias checkright +moveright"
alias -mfwd		"dsp_volume 0;-forward;checkback;alias checkfwd none"
alias -mback	"dsp_volume 0;-back;checkfwd;alias checkback none"
alias -mleft	"dsp_volume 0;-moveleft;checkright;alias checkleft none"
alias -mright	"dsp_volume 0;-moveright;checkleft;alias checkright none"
alias checkfwd	"none"
alias checkback	"none"
alias checkleft	"none"
alias checkright "none"
alias none		""

// Movement
bind UPARROW	+mfwd
bind DOWNARROW	+mback
bind LEFTARROW	+mleft
bind RIGHTARROW	+mright
bind RCTRL		+jump
bind MWHEELDOWN	+jump
bind MOUSE3		duck
bind KP_INS		duck
bind KP_END		+duck
bind '		    +speed

// Gameplay
bind MOUSE1		+attack
bind MOUSE2		+attack2
bind ENTER		+use
bind /			+reload
bind PGDN		+zoom
bind DEL		"slot1"
bind END		"slot2"
bind SPACE		"slot4; slot5" // Pills if available, otherwise default to medkit
bind 0			slot10
bind 1			slot1
bind 2			slot2
bind 3			slot3
bind 4			slot4
bind 5			slot5
bind 6			slot6
bind 7			slot7
bind 8			slot8
bind 9			slot9
bind KP_LEFTARROW	"impulse 100"	// Flashlight
bind F			"impulse 201"	// Spray

// UI & Chat
bind ESCAPE		cancelselect
bind TAB		+sb
bind SHIFT		+sb
bind `			toggleconsole
bind F8			motd
bind A			"+mouse_menu Orders"
bind S			"+mouse_menu QA"
bind Y			messagemode
bind U			messagemode2
bind BACKSPACE	+voicerecord
bind MOUSE5		+voicerecord
bind RSHIFT		+voicerecord
bind Q			voicebind_off
bind F1			"Vote Yes"
bind F2			"Vote No"
bind F5			chooseteam
bind F6			jpeg
bind ]			"say_team go"
bind [			"say_team back"
bind =			"say_team hide"
bind P			"say_team kill common"

// Misc
bind F12		"disconnect;duckOFF"
bind HOME		toggle_music
bind PGUP		toggle_vol
bind KP_UPARROW	"toggle mat_monitorgamma_tv_enabled"
bind .			fov_toggle

// Confogl
bind F3			"cmd_ready; duckOFF; mat_monitorgamma 1.6" // Disable forced crouch bind if toggled between rounds, reset gamma (for L4D1)
bind F4			cmd_unready
bind F9			cmd_pause
bind Z			cmd_tank
bind X			cmd_current
bind C			cmd_bonus
bind KP_PGUP	cmd_spec

// Local Server
bind I          noclip

// JOYSTICK
joystick 0 // Disable controller input
joy_advanced 0
sc_enable 0 // Disable steam controller input
sc_enable2 0
alias controller "joy_accelmax 3;joy_accelscale 0.4;joy_pitchsensitivity 2.7;joy_yawsensitivity -4"
controller // Custom controller analog stick settings, improved aim over defaults

echo "[AUTO] controls.cfg loaded"

//honey's L4D2 Autoexec//
// Rates & Interpolation
rate 100000
cl_interp_ratio -1

alias "10lerp" "cl_interp 0.01"
alias "0lerp" "cl_interp 0"
alias "100r" "cl_cmdrate 100;cl_updaterate 100;cl_interp 0"
alias "pub" "cl_cmdrate 30;cl_updaterate 30;cl_interp 0.04"

100r

// Net Graph
net_graphproportionalfont 0 // Small net_graph font
net_graphpos 320 // Position between health bars
net_graphheight 5 // Distace between net graph and bottom of screen
net_graphmsecs 400 // Scale of ping over time graph on net_graph 2 or higher
net_graphshowlatency 1
net_graphshowinterp 1
net_graphtext 1
net_graphsolid 1
net_scale 500 // Size of data packet type graph on net_graph 2 or higher, higher value = smaller graph
net_graph 1

// Networking
mm_dedicated_search_maxping 80
cl_timeout 15
cl_resend 6
cl_downloadfilter "none"
//net_splitpacket_maxrate 30000
//net_splitrate 2
//net_maxroutable 1280
l4d_delete_temp_files 1

// Lobby
ui_public_lobby_filter_status lobby
ui_public_lobby_filter_campaign official
ui_public_lobby_filter_difficulty2 ""

echo "[AUTO] networking.cfg loaded"

// honey's L4D2 Autoexec
// CROSSHAIR
cl_crosshair_red 255
cl_crosshair_green 255
cl_crosshair_blue 0
cl_crosshair_alpha 255 // 0 - 255
cl_crosshair_thickness 2 // int 1 - 5
cl_colorblind 1 // Adds outline and forces white crosshair
cl_crosshair_dynamic 0
cl_observercrosshair 1
crosshair 1

// GLOWS
// Survivor-Side Glows
cl_glow_survivor_r 0; cl_glow_survivor_g 1; cl_glow_survivor_b 0 // Standing (Green)
cl_glow_survivor_hurt_r 1; cl_glow_survivor_hurt_g 1; cl_glow_survivor_hurt_b 0 // Incapped (Yellow)
cl_glow_survivor_vomit_r 0.5; cl_glow_survivor_vomit_g 0; cl_glow_survivor_vomit_b 1 // Boomed (Purple)
cl_glow_ability_r 0; cl_glow_ability_g 1; cl_glow_ability_b 1 // Capping Infected (Cyan)
cl_glow_item_r 0; cl_glow_item_g 1; cl_glow_item_b 0 // Close Items (Green)
cl_glow_item_far_r 1; cl_glow_item_far_g 0; cl_glow_item_far_b 0 // Far Items (Red)

// Infected Side Glows
cl_glow_survivor_health_high_r 0; cl_glow_survivor_health_high_g 1; cl_glow_survivor_health_high_b 0 // High Health Survivor (Green)
cl_glow_survivor_health_med_r 1; cl_glow_survivor_health_med_g 1; cl_glow_survivor_health_med_b 0 // Medium Health Survivor (Yellow)
cl_glow_survivor_health_low_r 1; cl_glow_survivor_health_low_g 1; cl_glow_survivor_health_low_b 1 // Low Health Survivor (White)
cl_glow_survivor_health_crit_r 0.8; cl_glow_survivor_health_crit_g 0; cl_glow_survivor_health_crit_b 0 // Incapped Survivor (Red)
cl_glow_infected_vomit_r 1; cl_glow_infected_vomit_g 0; cl_glow_infected_vomit_b 1 // Boomed Survivor
cl_glow_infected_r 0; cl_glow_infected_g 1; cl_glow_infected_b 1 // Spawned Infected (Cyan)
cl_glow_ghost_infected_r 1; cl_glow_ghost_infected_g 0; cl_glow_ghost_infected_b 0.15 // Ghost Infected (Red/Pink)
cl_glow_thirdstrike_item_r 1; cl_glow_thirdstrike_item_g 0.25; cl_glow_thirdstrike_item_b 0 // Hittables + B&W Items (Orange)

cl_glow_survivor_health_include_buffer 1 // Include temp HP in glow color thresholds
cl_glow_survivor_health_bleed_pulse 1 // Enable temp HP pulsing
cl_glow_survivor_health_bleed_pulse_amount 0.65
cl_glow_survivor_health_bleed_pulse_speed 15

// GRAPHICS
mat_monitorgamma 1.6
mat_monitorgamma_tv_enabled 1
mat_queue_mode 2 // Multi-threading
mat_grain_scale_override 0
cl_ragdoll_limit 0
cam_ideallag 0
c_thirdpersonshoulder 0
c_thirdpersonshoulderoffset 0
c_thirdpersonshoulderheight 0
cl_playerspraydisable 1
spec_allowroaming 1
cl_ideal_spec_mode 6


echo "[AUTO] visuals.cfg loaded"

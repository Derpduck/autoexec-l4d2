// honey's L4D2 Autoexec
// Launch Options
// -lv -novid -nojoy -noborder +mat_motion_blur_percent_of_screen_max 0 -nostartupsound

echo ""
echo "Loading honey's L4D2 autoexec.cfg"
echo "________________________________"
echo ""

// ALIASES
// General
alias rcd			"stop;record DEMOFIX;stop"
alias muteall		"voice_mute 1;voice_mute 2;voice_mute 3;voice_mute 4;voice_mute 5;voice_mute 6;voice_mute 7;voice_mute 8;voice_mute 9"
alias unmuteall		"voice_unmute 1;voice_unmute 2;voice_unmute 3;voice_unmute 4;voice_unmute 5;voice_unmute 6;voice_unmute 7;voice_unmute 8;voice_unmute 9"

// Binds
alias "+sb"			"+showscores;net_graph 4"
alias "-sb"			"-showscores;net_graph 1"
alias fov_toggle	"toggle cl_viewmodelfovsurvivor 70 85 110 180"
alias duck			"duckON"
alias duckON		"+duck;net_graphproportionalfont 1;alias duck duckOFF;echo @ [   DUCK ON   ]"
alias duckOFF		"-duck;net_graphproportionalfont 0;alias duck duckON;echo @ [   DUCK OFF   ]"
alias defaul_tvol	"volume 0.035"
alias toggle_vol	"toggle volume 0.01 0.035"
alias toggle_music	"toggle snd_musicvolume 0 0.7"
alias voicebind_off	"unbind RSHIFT;echo @ [   UNBOUND VOICE   ];bind Q voicebind_on"
alias voicebind_on	"bind RSHIFT +voicerecord;echo @ [   BOUND VOICE   ];bind Q voicebind_off"

// Confogl
alias cmd_current	"sm_current"
alias cmd_tank		"sm_tank"
alias cmd_ready		"sm_ready"
alias cmd_unready	"sm_unready"
alias cmd_spec		"sm_spectate"
alias cmd_pause		"sm_pause"
alias cmd_bonus 	"sm_health full"
alias cmd_bonesaw	"sm_bonesaw 59"
alias spawnorder	"echo Smoker -> Boomer -> Hunter -> Spitter -> Jockey -> Charger"

// Local Server
alias solo			"exec auto/_soloversus"
alias navedit		"exec auto/_navedit"

// Execute .cfg files
exec "auto/visuals"
exec "auto/networking"
exec "auto/controls"
exec "auto/audio"
//exec "auto/l4d1"
bind I noclip

// Personal Settings
sensitivity 0.65 // 1600 DPI
fov_desired 100
cl_viewmodelfovsurvivor 85
fps_max 400
engine_no_focus_sleep 60
default_vol


echo ""
echo "_______________________________"
echo "honey's L4D2 autoexec.cfg loaded"
echo ""
